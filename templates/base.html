<!DOCTYPE html>
<html>
<head>

<title>HRM System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="d-flex">

<!-- Sidebar -->

<h4 class="mb-4">HRM System</h4>

<a href="/" class="text-white d-block mb-3">📊 Dashboard</a>
<a href="/employees" class="text-white d-block mb-3">👨‍💼 Employees</a>
<a href="/attendance" class="text-white d-block mb-3">🕒 Attendance</a>

<div class="bg-dark text-white p-3" style="width:220px; height:100vh;">

<h4>HRM System</h4>

<hr>

<a href="/" class="text-white d-block mb-2">Dashboard</a>

<a href="/employees" class="text-white d-block mb-2">Employees</a>

<a href="/attendance" class="text-white d-block mb-2">Attendance</a>
{% if employees %}
   {% for emp in employees %}
   ...
   {% endfor %}
{% else %}
<tr>
<td colspan="6" class="text-center">No employees found</td>
</tr>
{% endif %}
</div>

<!-- Main Content -->

<div class="p-4 w-100">

{% block content %}

{% endblock %}

</div>

</div>

</body>
</html>
