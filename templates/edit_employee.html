<!DOCTYPE html>
<html>
<head>

<title>Edit Employee</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<h2>Edit Employee</h2>

<form action="/update_employee/{{ emp.emp_id }}" method="POST">

<div class="mb-3">
<label>Name</label>
<input type="text" name="emp_name" class="form-control" value="{{ emp.emp_name }}">
</div>

<div class="mb-3">
<label>Email</label>
<input type="email" name="email" class="form-control" value="{{ emp.email }}">
</div>

<div class="mb-3">
<label>Phone</label>
<input type="text" name="phone" class="form-control" value="{{ emp.phone }}">
</div>

<div class="mb-3">
<label>Department</label>

<select name="department_id" class="form-control">

{% for dept in departments %}

<option value="{{ dept.dept_id }}"
{% if dept.dept_id == emp.department_id %}
selected
{% endif %}>

{{ dept.dept_name }}

</option>

{% endfor %}

</select>

</div>

<button class="btn btn-primary">Update Employee</button>

</form>

</div>

</body>
</html>
